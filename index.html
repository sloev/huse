<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydfyn House Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const RouteMap = ({ path }) => {
            if (!path) return null;
            
            // Simplified relative mapping for the small SVG
            // We'll calculate a bounding box for the path
            const allCoords = path.flatMap(p => [p.from, p.to]);
            const lons = allCoords.map(c => c[0]);
            const lats = allCoords.map(c => c[1]);
            const minLon = Math.min(...lons);
            const maxLon = Math.max(...lons);
            const minLat = Math.min(...lats);
            const maxLat = Math.max(...lats);
            
            const padding = 0.005; // degree padding
            const mapMinLon = minLon - padding;
            const mapMaxLon = maxLon + padding;
            const mapMinLat = minLat - padding;
            const mapMaxLat = maxLat + padding;
            
            const scaleX = (lon) => ((lon - mapMinLon) / (mapMaxLon - mapMinLon)) * 100;
            const scaleY = (lat) => (1 - (lat - mapMinLat) / (mapMaxLat - mapMinLat)) * 100; // Invert Y for SVG

            return (
                <div className="h-24 w-full bg-slate-50 rounded border border-slate-100 overflow-hidden mb-4 relative">
                    <svg viewBox="0 0 100 100" className="w-full h-full">
                        {path.map((segment, i) => {
                            const x1 = scaleX(segment.from[0]);
                            const y1 = scaleY(segment.from[1]);
                            const x2 = scaleX(segment.to[0]);
                            const y2 = scaleY(segment.to[1]);
                            
                            const color = segment.type === 'WALK' ? '#22c55e' : 
                                          segment.type === 'BIKE' ? '#f97316' : '#3b82f6';
                            
                            return (
                                <g key={i}>
                                    <line 
                                        x1={x1} y1={y1} x2={x2} y2={y2} 
                                        stroke={color} 
                                        strokeWidth="3" 
                                        strokeLinecap="round"
                                        strokeDasharray={segment.type === 'BUS' ? "0" : "1 4"}
                                    />
                                    {i === 0 && <circle cx={x1} cy={y1} r="3" fill="#ef4444" />} {/* Start/House */}
                                    {i === path.length - 1 && <circle cx={x2} cy={y2} r="3" fill="#1e293b" />} {/* End/Dest */}
                                </g>
                            );
                        })}
                    </svg>
                    <div className="absolute bottom-1 right-1 flex gap-2 text-[8px] uppercase font-bold text-gray-400">
                        <span className="flex items-center gap-0.5"><span className="w-1.5 h-1.5 rounded-full bg-green-500"></span> Gå</span>
                        <span className="flex items-center gap-0.5"><span className="w-1.5 h-1.5 rounded-full bg-orange-500"></span> Cykel</span>
                        <span className="flex items-center gap-0.5"><span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Bus</span>
                    </div>
                </div>
            );
        };

        const HouseCard = ({ house }) => {
            const [viewed, setViewed] = useState(false);

            useEffect(() => {
                const viewedList = JSON.parse(localStorage.getItem('viewedHouses') || '[]');
                if (viewedList.includes(house.id)) {
                    setViewed(true);
                }
            }, [house.id]);

            const markViewed = () => {
                const viewedList = JSON.parse(localStorage.getItem('viewedHouses') || '[]');
                if (!viewedList.includes(house.id)) {
                    viewedList.push(house.id);
                    localStorage.setItem('viewedHouses', JSON.stringify(viewedList));
                    setViewed(true);
                }
            };

            return (
                <div className="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow flex flex-col relative">
                    {!viewed && (
                        <div className="absolute top-2 left-2 bg-yellow-400 text-yellow-900 text-[10px] font-bold px-2 py-1 rounded shadow z-20 uppercase tracking-tighter">
                            NY
                        </div>
                    )}
                    <div className="h-48 overflow-hidden bg-gray-200">
                        <img 
                            src={house.image} 
                            alt={house.address} 
                            className="w-full h-full object-cover"
                            onError={(e) => { e.target.src = 'https://via.placeholder.com/400x300?text=No+Image'; }}
                        />
                    </div>
                    <div className="p-4 flex-grow relative">
                        {house.isForeclosure && (
                            <div className="absolute -top-6 right-2 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded shadow-lg uppercase tracking-wider z-10 border border-white">
                                Tvangsauktion
                            </div>
                        )}
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="text-lg font-bold text-gray-800 leading-tight">{house.address}</h3>
                            <div className="flex flex-col items-end shrink-0 ml-2">
                                <span className="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">
                                    {house.price?.toLocaleString()} DKK
                                </span>
                                {house.priceChangePercent !== 0 && (
                                    <span className={`text-[10px] font-bold ${house.priceChangePercent < 0 ? 'text-green-600' : 'text-red-600'}`}>
                                        {house.priceChangePercent > 0 ? '↑' : ''}{house.priceChangePercent}% ({house.priceChangeCash?.toLocaleString()} DKK)
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-4">
                            <div className="flex items-center gap-1">
                                <span className="text-base">🏠</span> 
                                <span>{house.size} m² / <span className="font-bold text-gray-900">{house.rooms} vær</span></span>
                            </div>
                            <div>🌳 {house.lotSize} m² grund</div>
                            <div>⚡ Energi: {house.energyRating || 'N/A'}</div>
                            <div className="font-bold text-green-600">🕒 {house.commute.duration} min</div>
                        </div>
                        <div className="flex items-center text-xs text-gray-500 mb-4 bg-gray-50 p-2 rounded">
                            <span>{house.commute.mode}: {house.commute.line}</span>
                        </div>

                        <RouteMap path={house.commute.path} />

                        <a 
                            href={house.link} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            onClick={markViewed}
                            className="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors"
                        >
                            View Listing
                        </a>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [houses, setHouses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('');

            useEffect(() => {
                fetch('houses.json')
                    .then(res => res.json())
                    .then(data => {
                        setHouses(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Error loading houses:", err);
                        setLoading(false);
                    });
            }, []);

            const lastUpdated = houses.length > 0 ? new Date().toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' }) : '';

            const filteredHouses = houses.filter(h => 
                h.address.toLowerCase().includes(filter.toLowerCase())
            );

            if (loading) return (
                <div className="flex justify-center items-center h-screen">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="mb-8 flex justify-between items-end">
                        <div>
                            <h1 className="text-3xl font-bold text-gray-900 mb-2">Sydfyn House Finder</h1>
                            <p className="text-gray-600">Houses within 40 mins bus commute to Ollerup Bytorv 4</p>
                        </div>
                        {lastUpdated && <div className="text-sm text-gray-400 italic">Opdateret: {lastUpdated}</div>}
                    </header>

                    <div className="mb-6">
                        <input 
                            type="text" 
                            placeholder="Filter by address..." 
                            className="w-full max-w-md px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                            value={filter}
                            onChange={(e) => setFilter(e.target.value)}
                        />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredHouses.map(house => (
                            <HouseCard key={house.id} house={house} />
                        ))}
                    </div>

                    {filteredHouses.length === 0 && (
                        <div className="text-center py-12">
                            <p className="text-gray-500 text-xl">No houses found matching your criteria.</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
